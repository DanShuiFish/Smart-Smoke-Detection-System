version: "3.8"
services:
  # MQTT Broker
  emqx:
    image: emqx/emqx:5.3.0
    container_name: smoke-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    environment:
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=admin123
    restart: unless-stopped

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: smoke-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=smart_smoke
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7.2
    container_name: smoke-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ""
    restart: unless-stopped

volumes:
  mysql_data:
