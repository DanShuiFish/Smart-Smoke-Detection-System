server:
  port: 8080

spring:
  application:
    name: smart-smoke-detection
  datasource:
    url: ${DB_URL:jdbc:mysql://10.120.67.60:3306/smart_smoke?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  web:
    resources:
      static-locations: classpath:/static/,file:./smart-smoke-models/test-images/
  data:
    redis:
      host: ${REDIS_HOST:10.120.67.60}
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

sa-token:
  # 关闭全局过滤器（SaPathCheckFilterForJakartaServlet），避免拦截静态资源
  is-global-filter: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartsmoke.entity
  global-config:
    banner: false
    db-config:
      id-type: AUTO
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

mqtt:
  broker:
    url: ${MQTT_BROKER_URL:tcp://10.120.67.60:1883}
    client-id: ${MQTT_CLIENT_ID:smart-smoke-backend}
    username: ${MQTT_USERNAME:fasong}
    password: ${MQTT_PASSWORD:fasong123}
  topics:
    subscribe: "smoke/+/data,smoke/+/heartbeat"
    publish-cmd: "smoke/%s/cmd"

logging:
  level:
    com.smartsmoke: debug

maxkb:
  base-url: ${MAXKB_BASE_URL:http://10.120.67.60:8080/chat/api}
  api-key: ${MAXKB_API_KEY:agent-f80381fc92fdbbfd9ea75940b7ca5c18}
  application-id: ${MAXKB_APP_ID:019f2b03-6788-73a3-9ddf-555c3926a6fe}
  timeout: 30000

smart-java-ai:
  model-path: ${SMART_AI_MODEL_PATH:./smart-smoke-models}
  threshold: 0.3
