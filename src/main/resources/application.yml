server:
  port: 8080

spring:
  application:
    name: smart-smoke-detection
  datasource:
    url: jdbc:mysql://localhost:3306/smart_smoke?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartsmoke.entity
  global-config:
    banner: false
    db-config:
      id-type: AUTO
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
mqtt:
  broker:
    url: tcp://localhost:1883
    client-id: smart-smoke-backend
    completion-timeout: 3000
    reconnect:
      enabled: true
      max-delay: 10000
    topics:
      data-up: "smoke/+/data"          # 上报数据的订阅主题 (+为通配符)
      heartbeat-up: "smoke/+/heartbeat" # 心跳的订阅主题
      cmd-down: "smoke/String.format/cmd"         # 下发控制指令的主题 (用 %s 占位，Java 里用 String.format 替换)
logging:
  level:
    com.smartsmoke: debug
