server:
  port: 8080

spring:
  application:
    name: smart-smoke-detection
  datasource:
    url: ${DB_URL:jdbc:mysql://192.168.130.101:3306/smart_smoke?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true
  data:
    redis:
      host: ${REDIS_HOST:192.168.130.101}
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartsmoke.entity
  global-config:
    banner: false
    db-config:
      id-type: AUTO
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

mqtt:
  broker:
    url: ${MQTT_BROKER_URL:tcp://192.168.130.101:1883}
    client-id: ${MQTT_CLIENT_ID:smart-smoke-backend}
    username: ${MQTT_USERNAME:fasong}
    password: ${MQTT_PASSWORD:fasong123}
    completion-timeout: 3000
    reconnect:
      enabled: true
      max-delay: 10000
  topics:
    subscribe: "smoke/+/data,smoke/+/heartbeat"
    publish-cmd: "smoke/%s/cmd"

logging:
  level:
    com.smartsmoke: debug


sa-token:
  token-name: Authorization
  token-prefix: Bearer
