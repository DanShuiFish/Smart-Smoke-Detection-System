<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧烟感预警系统</title>
  <link rel="stylesheet" href="/login.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- 左侧品牌区 -->
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="20" y="28" width="24" height="24" rx="2" fill="#fff" opacity="0.9" />
            <path d="M26 18c0-2 1.5-4 4-4h4c2.5 0 4 2 4 4v10H26V18z" fill="#fff" opacity="0.9" />
            <circle cx="32" cy="38" r="3" fill="#dc2626" />
            <rect x="28" y="14" width="8" height="4" rx="1" fill="#fff" opacity="0.6" />
          </svg>
        </div>
        <h1>智慧烟感</h1>
        <p>智能火灾预警系统 · AIoT 安全守护</p>
        <div class="brand-features">
          <span>🔍 AI 视觉复核</span>
          <span>💬 智能问答</span>
          <span>📡 实时监测</span>
        </div>
      </div>

      <!-- 右侧表单区 -->
      <div class="auth-form-panel">
        <!-- Tab 切换 -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登 录</button>
          <button class="auth-tab" data-tab="register">注 册</button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label>用户名</label>
            <div class="input-icon">
              <span class="icon">👤</span>
              <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required />
            </div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <div class="input-icon">
              <span class="icon">🔒</span>
              <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" required />
            </div>
          </div>
          <div class="form-error" id="loginError"></div>
          <button type="submit" class="btn-submit" id="btnLogin">
            <span class="btn-text">登 录</span>
            <span class="btn-loading hidden">登录中...</span>
          </button>
          <p class="form-hint">默认管理员：admin / admin123</p>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label>用户名 <span class="required">*</span></label>
            <div class="input-icon">
              <span class="icon">👤</span>
              <input type="text" id="regUsername" placeholder="请输入用户名" required />
            </div>
          </div>
          <div class="form-group">
            <label>密码 <span class="required">*</span></label>
            <div class="input-icon">
              <span class="icon">🔒</span>
              <input type="password" id="regPassword" placeholder="至少6位密码" required minlength="6" />
            </div>
          </div>
          <div class="form-group">
            <label>确认密码 <span class="required">*</span></label>
            <div class="input-icon">
              <span class="icon">🔒</span>
              <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" required />
            </div>
          </div>
          <div class="form-group">
            <label>真实姓名</label>
            <div class="input-icon">
              <span class="icon">📝</span>
              <input type="text" id="regRealName" placeholder="请输入姓名" />
            </div>
          </div>
          <div class="form-group">
            <label>手机号</label>
            <div class="input-icon">
              <span class="icon">📱</span>
              <input type="tel" id="regPhone" placeholder="请输入手机号" />
            </div>
          </div>
          <div class="form-group">
            <label>角色</label>
            <div class="role-selector">
              <label class="role-option active" data-role="RESIDENT">
                <input type="radio" name="regRole" value="RESIDENT" checked />
                <span class="role-badge">🏠</span>
                <strong>居民</strong>
                <small>查看我的设备与告警</small>
              </label>
              <label class="role-option" data-role="COMMUNITY_ADMIN">
                <input type="radio" name="regRole" value="COMMUNITY_ADMIN" />
                <span class="role-badge">🏢</span>
                <strong>小区管理员</strong>
                <small>管理小区设备与告警</small>
              </label>
            </div>
          </div>
          <div class="form-error" id="registerError"></div>
          <button type="submit" class="btn-submit" id="btnRegister">
            <span class="btn-text">注 册</span>
            <span class="btn-loading hidden">注册中...</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
