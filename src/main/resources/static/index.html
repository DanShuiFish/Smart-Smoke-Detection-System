<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧烟感预警系统登录</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --line: #d9e3f0;
      --text: #1f2a37;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        linear-gradient(135deg, rgba(37,99,235,0.08), rgba(16,185,129,0.06)),
        linear-gradient(0deg, #f8fbff, #eef4fb);
      color: var(--text);
      display: grid;
      place-items: center;
    }
    .login-shell {
      width: min(960px, calc(100vw - 32px));
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(12px);
    }
    .hero {
      padding: 48px 42px;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 40%),
        radial-gradient(circle at bottom right, rgba(16,185,129,0.18), transparent 38%);
      border-right: 1px solid rgba(217,227,240,0.8);
    }
    .hero h1 {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.15;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }
    .hero-cards {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }
    .hero-card {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.76);
    }
    .hero-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }
    .hero-card span {
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      padding: 42px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .panel h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .panel .sub {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .form-row {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      font-size: 14px;
      color: #374151;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.10);
    }
    button {
      height: 46px;
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 10px 20px rgba(37,99,235,0.18);
    }
    button[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .error {
      min-height: 20px;
      margin: 10px 0 0;
      color: var(--danger);
      font-size: 13px;
    }
    @media (max-width: 860px) {
      .login-shell { grid-template-columns: 1fr; }
      .hero { display: none; }
      .panel { padding: 32px 22px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
</body>
</html>
